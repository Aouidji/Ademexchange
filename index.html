<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adem exchange Shop |  </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .loader { border-top-color: #764ba2; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center">

    <div class="max-w-2xl w-full glass-effect shadow-2xl rounded-[2.5rem] overflow-hidden border border-white/20">
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-8 text-white text-center relative">
            <h1 class="text-3xl font-black mb-2">تسوق بذكاء من عند adem vx</h1>
            <p class="opacity-90 font-medium">سرعة،ثقة وعمولة هي الأفضل </p>
        </div>

        <div class="p-6 md:p-8">
            <div class="mb-8">
                <label class="block text-purple-900 font-bold mb-3 mr-2 flex items-center gap-2">
                    <i class="fas fa-link text-purple-600"></i> ضع رابط منتج (Temu/AliExpress):
                </label>
                <input type="text" id="productUrl" oninput="fetchData()" placeholder="انسخ الرابط هنا..." 
                class="w-full p-4 bg-purple-50 border-2 border-purple-100 rounded-2xl focus:border-purple-600 focus:bg-white outline-none transition-all text-left dir-ltr shadow-inner">
            </div>

            <div id="loading" class="hidden flex flex-col items-center py-6">
                <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
                <p class="text-purple-700 font-bold animate-pulse">جاري فحص الرابط...</p>
            </div>

            <div id="resultCard" class="hidden animate-in fade-in duration-500">
                <div class="bg-gradient-to-br from-purple-50 to-blue-50 border-2 border-purple-200 rounded-3xl p-6 mb-4 text-center">
                    <p class="text-xs text-purple-400 font-bold uppercase mb-1">السعر المحول بالدينار</p>
                    <p id="dzPrice" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">0.00 د.ج</p>
                </div>

                <div class="flex items-start gap-3 bg-amber-50 p-4 rounded-2xl border border-amber-200 mb-8 font-bold text-amber-800 text-sm">
                    <i class="fas fa-circle-info text-amber-500 text-xl mt-1"></i>
                    <p>ملاحظة: السعر قد يختلف حسب الخيارات. انتظر اتصالنا لتأكيد السعر النهائي.</p>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-right">
                        <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full p-4 bg-white border border-purple-100 rounded-xl outline-none shadow-sm">
                        <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full p-4 bg-white border border-purple-100 rounded-xl outline-none shadow-sm">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-right">
                        <input type="text" id="custState" placeholder="الولاية" class="w-full p-4 bg-white border border-purple-100 rounded-xl outline-none shadow-sm">
                        <input type="text" id="custCity" placeholder="البلدية" class="w-full p-4 bg-white border border-purple-100 rounded-xl outline-none shadow-sm">
                    </div>
                    <button onclick="sendToTelegram()" id="btnSubmit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95">
                        <i class="fab fa-telegram-plane ml-2"></i> تأكيد الطلب وإرساله
                    </button>
                </div>
            </div>

            <div id="errorHelper" class="hidden mt-4 p-5 bg-pink-50 text-pink-700 rounded-2xl border border-pink-100 text-center">
                <p class="font-bold mb-2">⚠️ تعذر جلب السعر تلقائياً</p>
                <p class="text-xs mb-4">أدخل السعر بالدولار ($) يدوياً:</p>
                <div class="flex gap-2">
                    <input type="number" id="manualUsd" placeholder="0.00" class="flex-1 p-3 border-2 border-pink-200 rounded-xl outline-none">
                    <button onclick="applyManualPrice()" class="bg-pink-600 text-white px-6 rounded-xl font-bold">تحويل</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalPrice = 0;
        const TG_TOKEN = "8151534535:AAFC6hByDJ8z-elJj0RKJ7pfdJ3Gs0UDRig";
        const TG_ID = "6335106371";

        async function fetchData() {
            const url = document.getElementById('productUrl').value;
            if (url.length < 15) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('errorHelper').classList.add('hidden');

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                const html = data.contents;
                const priceMatch = html.match(/\"value\":(\d+\.\d+)/) || html.match(/US\s?\$?(\d+\.\d+)/i) || html.match(/\$(\d+\.\d+)/);

                if (priceMatch) {
                    processPrice(parseFloat(priceMatch[1]));
                } else { throw new Error(); }
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorHelper').classList.remove('hidden');
            }
        }

        function processPrice(usd) {
            globalPrice = (usd * 300).toFixed(0);
            document.getElementById('dzPrice').innerText = parseInt(globalPrice).toLocaleString() + " د.ج";
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');
        }

        function applyManualPrice() {
            const val = document.getElementById('manualUsd').value;
            if(val) processPrice(parseFloat(val));
        }

        async function sendToTelegram() {
            const btn = document.getElementById('btnSubmit');
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const state = document.getElementById('custState').value;
            const city = document.getElementById('custCity').value;
            const url = document.getElementById('productUrl').value;

            if(!name || !phone || !state || !city) {
                alert("يرجى ملء جميع الخانات");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            const message = `📦 *طلب شراء جديد* 📦\n\n👤 *الاسم:* ${name}\n📞 *الهاتف:* ${phone}\n📍 *الموقع:* ${state}, ${city}\n💰 *السعر:* ${globalPrice} DZD\n🔗 *الرابط:* ${url}`;

            const tgUrl = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            try {
                await fetch(tgUrl);
                alert("تم إرسال طلبك بنجاح! سنتصل بك قريباً.");
                location.reload();
            } catch (e) {
                alert("حدث خطأ في الإرسال، حاول مجدداً.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
